name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install package dependencies
        run: npm ci --ignore-scripts

      - name: Build Lambda artifact
        run: npm run build:artifact

      - name: Smoke test Lambda artifact
        run: npm run smoke:test

      - name: Pack npm tarball
        run: npm pack

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/*
            *.tgz

      - name: Read build metadata
        if: startsWith(github.ref, 'refs/tags/')
        id: build_metadata
        run: |
          upstream_tag="$(jq -r .upstreamTag dist/build-metadata.json)"
          upstream_repo="$(jq -r .upstreamRepo dist/build-metadata.json)"
          sha256="$(jq -r .sha256 dist/build-metadata.json)"
          {
            echo "upstream_tag=${upstream_tag}"
            echo "upstream_repo=${upstream_repo}"
            echo "sha256=${sha256}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Lambda artifact built from upstream Obscura ${{ steps.build_metadata.outputs.upstream_tag }}.

            - Upstream repo: ${{ steps.build_metadata.outputs.upstream_repo }}
            - Upstream tag: ${{ steps.build_metadata.outputs.upstream_tag }}
            - Artifact SHA256: `${{ steps.build_metadata.outputs.sha256 }}`
          files: |
            dist/*

      - name: Publish package to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: npm publish --access public
